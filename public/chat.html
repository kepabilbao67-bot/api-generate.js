<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Chat Creator - APIForge</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#6366f1;--bg:#0f172a;--bg-card:#1e293b;--text:#f8fafc;--text-muted:#94a3b8;--border:#334155;--success:#10b981}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
    .header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .header h1{font-size:1.2rem;font-weight:700}
    .header .badge{background:var(--primary);color:white;padding:2px 8px;border-radius:10px;font-size:0.7rem}
    .chat-container{flex:1;overflow-y:auto;padding:24px;max-width:800px;margin:0 auto;width:100%}
    .message{margin-bottom:16px;display:flex;gap:12px}
    .message.user{justify-content:flex-end}
    .message.user .bubble{background:var(--primary);border-radius:16px 16px 4px 16px}
    .message.assistant .bubble{background:var(--bg-card);border:1px solid var(--border);border-radius:16px 16px 16px 4px}
    .bubble{padding:12px 16px;max-width:80%;line-height:1.5;font-size:0.95rem;white-space:pre-wrap}
    .bubble code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-size:0.85rem}
    .input-area{padding:16px 24px;border-top:1px solid var(--border);max-width:800px;margin:0 auto;width:100%}
    .input-row{display:flex;gap:8px}
    .input-row input{flex:1;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:1rem;outline:none}
    .input-row input:focus{border-color:var(--primary)}
    .input-row button{padding:12px 24px;border-radius:8px;background:var(--primary);color:white;border:none;font-weight:600;cursor:pointer}
    .input-row button:hover{background:#4f46e5}
    .typing{color:var(--text-muted);font-style:italic;padding:8px 16px}
    .suggestions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
    .suggestions button{padding:6px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.8rem;cursor:pointer}
    .suggestions button:hover{border-color:var(--primary);color:var(--primary)}
  </style>
</head>
<body>
  <div class="header">
    <h1>API Chat Creator</h1>
    <span class="badge">AI</span>
  </div>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <div class="suggestions" id="suggestions">
      <button onclick="sendSuggestion('I need a contacts API')">Contacts API</button>
      <button onclick="sendSuggestion('Create a task manager API')">Task Manager</button>
      <button onclick="sendSuggestion('API for restaurant with menu and reservations')">Restaurant</button>
      <button onclick="sendSuggestion('Expense tracker API')">Expenses</button>
      <button onclick="sendSuggestion('Blog API with posts and comments')">Blog CMS</button>
    </div>
    <div class="input-row">
      <input type="text" id="input" placeholder="Describe the API you want..." onkeypress="if(event.key==='Enter')send()">
      <button onclick="send()">Send</button>
    </div>
  </div>

  <script>
    const API = '/api/v1/chat';
    const token = localStorage.getItem('apiforge_token');
    let sessionId = null;

    function addMessage(role, text) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>').replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const input = document.getElementById('input');
      const msg = input.value.trim();
      if (!msg) return;

      input.value = '';
      addMessage('user', msg);
      document.getElementById('suggestions').style.display = 'none';

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ message: msg, sessionId }),
        });
        const data = await res.json();

        if (data.success) {
          sessionId = data.sessionId;
          addMessage('assistant', data.reply);
        } else {
          addMessage('assistant', `Error: ${data.error}. Make sure you're logged in.`);
        }
      } catch (e) {
        addMessage('assistant', 'Connection error. Is the server running?');
      }
    }

    function sendSuggestion(text) {
      document.getElementById('input').value = text;
      send();
    }

    // Initial greeting
    if (!token) {
      addMessage('assistant', 'Please log in first to create APIs. Go to the main page to register.');
    } else {
      addMessage('assistant', "Hey! I'm your API assistant. Describe what you need and I'll create it instantly.\n\nExamples:\n• \"I need an API for my clients and their projects\"\n• \"Create a recipe API with ingredients\"\n• \"Expense tracker with categories\"\n\nOr click a suggestion below!");
    }
  </script>
</body>
</html>
