<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - APIForge</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#6366f1;--bg:#0f172a;--bg-card:#1e293b;--text:#f8fafc;--text-muted:#94a3b8;--border:#334155;--success:#10b981;--warning:#f59e0b;--danger:#ef4444}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
    .sidebar{width:260px;background:var(--bg-card);border-right:1px solid var(--border);padding:24px;position:fixed;height:100vh;overflow-y:auto}
    .sidebar .logo{font-size:1.3rem;font-weight:800;margin-bottom:32px;color:var(--primary)}
    .sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;color:var(--text-muted);margin-bottom:4px;transition:all 0.2s}
    .sidebar nav a:hover,.sidebar nav a.active{background:rgba(99,102,241,0.1);color:var(--text)}
    .sidebar nav a.active{border-left:3px solid var(--primary)}
    .main{flex:1;margin-left:260px;padding:32px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
    .header h1{font-size:1.75rem;font-weight:700}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
    .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px}
    .stat-card .label{font-size:0.85rem;color:var(--text-muted);margin-bottom:8px}
    .stat-card .value{font-size:2rem;font-weight:700}
    .stat-card .change{font-size:0.8rem;margin-top:8px}
    .stat-card .change.up{color:var(--success)}
    .stat-card .change.down{color:var(--danger)}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px}
    .card h3{margin-bottom:16px;font-size:1.1rem}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:12px;border-bottom:1px solid var(--border)}
    th{color:var(--text-muted);font-size:0.8rem;text-transform:uppercase;letter-spacing:1px}
    .badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:0.75rem;font-weight:600}
    .badge-active{background:rgba(16,185,129,0.1);color:var(--success)}
    .badge-draft{background:rgba(245,158,11,0.1);color:var(--warning)}
    .btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:0.85rem}
    .btn-primary{background:var(--primary);color:white}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">APIForge</div>
    <nav>
      <a href="#" class="active">📊 Dashboard</a>
      <a href="#">⚡ My APIs</a>
      <a href="#">🛒 Marketplace</a>
      <a href="#">📦 Templates</a>
      <a href="#">🔑 API Keys</a>
      <a href="#">📈 Analytics</a>
      <a href="#">💰 Billing</a>
      <a href="#">🔔 Webhooks</a>
      <a href="#">⚙️ Settings</a>
    </nav>
  </aside>

  <main class="main">
    <div class="header">
      <h1>Dashboard</h1>
      <button class="btn btn-primary" onclick="createApi()">+ Create New API</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Total APIs</div>
        <div class="value" id="total-apis">-</div>
        <div class="change up">Active on marketplace</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Requests</div>
        <div class="value" id="total-requests">-</div>
        <div class="change up">All time</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg Latency</div>
        <div class="value" id="avg-latency">-</div>
        <div class="change up">Last 7 days</div>
      </div>
      <div class="stat-card">
        <div class="label">Revenue</div>
        <div class="value" id="revenue">-</div>
        <div class="change up">This month</div>
      </div>
    </div>

    <div class="card">
      <h3>My APIs</h3>
      <table>
        <thead>
          <tr><th>Name</th><th>Status</th><th>Requests</th><th>Revenue</th><th>Latency</th></tr>
        </thead>
        <tbody id="apis-table">
          <tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const API_BASE = '/api/v1';
    const token = localStorage.getItem('apiforge_token');

    async function fetchDashboard() {
      if (!token) { window.location.href = '/'; return; }
      try {
        const [apisRes, analyticsRes] = await Promise.all([
          fetch(`${API_BASE}/apis`, { headers: { Authorization: `Bearer ${token}` } }),
          fetch(`${API_BASE}/analytics/overview`, { headers: { Authorization: `Bearer ${token}` } }),
        ]);
        const apis = await apisRes.json();
        const analytics = await analyticsRes.json();
        if (analytics.success) {
          document.getElementById('total-apis').textContent = analytics.totalApis || 0;
          document.getElementById('total-requests').textContent = formatNumber(analytics.totalRequests || 0);
          document.getElementById('avg-latency').textContent = `${analytics.avgLatency || 0}ms`;
          document.getElementById('revenue').textContent = `$${(analytics.totalRevenue || 0).toFixed(2)}`;
        }
        if (apis.success && apis.apis.length > 0) {
          document.getElementById('apis-table').innerHTML = apis.apis.map(api => `
            <tr>
              <td><strong>${api.name}</strong><br><small style="color:var(--text-muted)">/api/v1/live/${api.slug}</small></td>
              <td><span class="badge badge-${api.status === 'active' ? 'active' : 'draft'}">${api.status}</span></td>
              <td>${formatNumber(api.total_requests)}</td>
              <td>$${(api.total_revenue || 0).toFixed(2)}</td>
              <td>${api.avg_latency || 0}ms</td>
            </tr>
          `).join('');
        }
      } catch (e) { console.error('Dashboard error:', e); }
    }

    function formatNumber(n) {
      if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n/1000).toFixed(1) + 'K';
      return String(n);
    }

    function createApi() { alert('Use POST /api/v1/apis to create a new API!'); }
    fetchDashboard();
  </script>
</body>
</html>
