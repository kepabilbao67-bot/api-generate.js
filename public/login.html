<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - APIForge</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#7c3aed;--primary-light:#a78bfa;--accent:#06b6d4;--bg:#030712;--bg-card:#111827;--text:#f9fafb;--text-muted:#9ca3af;--border:#1f2937;--danger:#ef4444;--success:#10b981}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    body::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(124,58,237,0.06) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(6,182,212,0.04) 0%,transparent 50%);pointer-events:none}
    .container{width:100%;max-width:420px;padding:24px;position:relative;z-index:1}
    .logo{text-align:center;font-size:1.8rem;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
    .logo span{background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:32px}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
    .tabs{display:flex;margin-bottom:28px;background:var(--bg);border-radius:10px;padding:4px;border:1px solid var(--border)}
    .tab{flex:1;padding:10px;text-align:center;cursor:pointer;color:var(--text-muted);font-weight:600;font-size:0.9rem;border-radius:8px;transition:all 0.2s}
    .tab.active{background:var(--bg-card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
    .form-group input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.95rem;outline:none;transition:border 0.2s}
    .form-group input:focus{border-color:var(--primary)}
    .form-group input::placeholder{color:#4b5563}
    .btn{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#6366f1);color:white;border:none;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.3s;box-shadow:0 4px 15px rgba(124,58,237,0.3)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(124,58,237,0.4)}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .error{color:var(--danger);font-size:0.85rem;margin-top:12px;padding:10px;background:rgba(239,68,68,0.1);border-radius:8px;border:1px solid rgba(239,68,68,0.2);display:none}
    .success{color:var(--success);font-size:0.85rem;margin-top:12px;padding:10px;background:rgba(16,185,129,0.1);border-radius:8px;display:none}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-muted);font-size:0.8rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .footer-text{text-align:center;margin-top:24px;font-size:0.85rem;color:var(--text-muted)}
    .footer-text a{color:var(--primary-light)}
    .back-link{display:block;text-align:center;margin-top:16px;color:var(--text-muted);font-size:0.85rem}
    .back-link:hover{color:var(--text)}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>API</span>Forge</div>
    <p class="subtitle">Create, publish & sell APIs in minutes</p>
    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="showTab('login')">Sign In</div>
        <div class="tab" onclick="showTab('register')">Create Account</div>
      </div>

      <form id="login-form" onsubmit="login(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="login-btn">Sign In</button>
        <div class="error" id="login-error"></div>
      </form>

      <form id="register-form" style="display:none" onsubmit="register(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" required placeholder="Choose a username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" required placeholder="Min 8 chars, 1 uppercase, 1 number" autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="reg-btn">Create Account</button>
        <div class="error" id="reg-error"></div>
        <div class="success" id="reg-success"></div>
      </form>

      <div class="footer-text">
        By signing up you agree to our Terms of Service
      </div>
    </div>
    <a href="/" class="back-link">← Back to home</a>
  </div>

  <script>
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', (tab==='login' && i===0) || (tab==='register' && i===1));
      });
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    }

    async function login(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      err.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('apiforge_token', data.token);
          localStorage.setItem('apiforge_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          err.textContent = data.error || 'Invalid credentials';
          err.style.display = 'block';
        }
      } catch (e) { err.textContent = 'Connection error. Try again.'; err.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Sign In';
    }

    async function register(e) {
      e.preventDefault();
      const btn = document.getElementById('reg-btn');
      const err = document.getElementById('reg-error');
      const suc = document.getElementById('reg-success');
      err.style.display = 'none'; suc.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('reg-username').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
          }),
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('apiforge_token', data.token);
          localStorage.setItem('apiforge_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          err.textContent = data.error || 'Registration failed';
          err.style.display = 'block';
        }
      } catch (e) { err.textContent = 'Connection error. Try again.'; err.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Create Account';
    }

    if (localStorage.getItem('apiforge_token')) window.location.href = '/dashboard.html';
  </script>
</body>
</html>
