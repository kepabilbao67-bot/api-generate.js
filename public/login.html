<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - APIForge</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#6366f1;--bg:#0f172a;--bg-card:#1e293b;--text:#f8fafc;--text-muted:#94a3b8;--border:#334155;--danger:#ef4444;--success:#10b981}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .container{width:100%;max-width:400px;padding:24px}
    .logo{text-align:center;font-size:2rem;font-weight:800;margin-bottom:32px;background:linear-gradient(135deg,#6366f1,#0ea5e9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:32px}
    .card h2{margin-bottom:24px;font-size:1.5rem}
    .tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
    .tab{flex:1;padding:12px;text-align:center;cursor:pointer;color:var(--text-muted);font-weight:600;border-bottom:2px solid transparent;transition:all 0.2s}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary)}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:0.85rem;color:var(--text-muted);margin-bottom:6px}
    .form-group input{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem;outline:none}
    .form-group input:focus{border-color:var(--primary)}
    .btn{width:100%;padding:12px;border-radius:8px;background:var(--primary);color:white;border:none;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px}
    .btn:hover{background:#4f46e5}
    .error{color:var(--danger);font-size:0.85rem;margin-top:8px;display:none}
    .success{color:var(--success);font-size:0.85rem;margin-top:8px;display:none}
    .divider{text-align:center;color:var(--text-muted);margin:16px 0;font-size:0.85rem}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">APIForge</div>
    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="showTab('login')">Login</div>
        <div class="tab" onclick="showTab('register')">Register</div>
      </div>

      <form id="login-form" onsubmit="login(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn">Login</button>
        <div class="error" id="login-error"></div>
      </form>

      <form id="register-form" style="display:none" onsubmit="register(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" required placeholder="myusername">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" required placeholder="Min 8 chars, 1 upper, 1 number">
        </div>
        <button type="submit" class="btn">Create Account</button>
        <div class="error" id="reg-error"></div>
        <div class="success" id="reg-success"></div>
      </form>
    </div>
  </div>

  <script>
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    }

    async function login(e) {
      e.preventDefault();
      const err = document.getElementById('login-error');
      err.style.display = 'none';
      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('apiforge_token', data.token);
          localStorage.setItem('apiforge_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          err.textContent = data.error;
          err.style.display = 'block';
        }
      } catch (e) { err.textContent = 'Connection error'; err.style.display = 'block'; }
    }

    async function register(e) {
      e.preventDefault();
      const err = document.getElementById('reg-error');
      const suc = document.getElementById('reg-success');
      err.style.display = 'none'; suc.style.display = 'none';
      try {
        const res = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('reg-username').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
          }),
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('apiforge_token', data.token);
          localStorage.setItem('apiforge_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          err.textContent = data.error;
          err.style.display = 'block';
        }
      } catch (e) { err.textContent = 'Connection error'; err.style.display = 'block'; }
    }

    // Redirect if already logged in
    if (localStorage.getItem('apiforge_token')) window.location.href = '/dashboard.html';
  </script>
</body>
</html>
